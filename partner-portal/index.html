<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Adviuz Partner</title>
<style>
:root{--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);--bg:#f0f2f5;--white:#fff;--border:#e9edef;--text:#111b21;--sub:#667781;--muted:#8696a0;--top:#1f2c34;--top2:#2a3942;--green:#00a884;--greenl:#d9fdd3;--amber:#f59e0b;--amberl:#fef3c7;--red:#ef4444;--redl:#fee2e2;--blue:#2563eb;--bluel:#dbeafe;--f:'Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
html,body{width:100%;height:100%;font-family:var(--f);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}

/* ── TOP BAR ── */
.topbar{background:var(--top);padding:calc(var(--st)+10px) 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50}
.tb-logo{height:22px;display:block;flex-shrink:0}
.tb-mid{flex:1}
.tb-ref{font-size:12px;font-weight:700;color:rgba(255,255,255,.9)}
.tb-rate{font-size:11px;color:rgba(255,255,255,.45)}
.tb-av{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;cursor:pointer;flex-shrink:0;border:none}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── TAB BAR ── */
.tabbar{background:var(--white);display:flex;flex-shrink:0;padding-bottom:var(--sb);border-top:1px solid var(--border);z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--f);position:relative}
.tab.active{color:var(--green)}
.tab svg{width:22px;height:22px;stroke-width:1.8;margin-bottom:3px}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.02em}
.tab-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--green);border:2px solid var(--white);display:none}

/* ── FILTER CHIPS ── */
.filter-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:var(--white);color:var(--sub);font-family:var(--f)}
.fchip.active{background:var(--top2);border-color:var(--top2);color:#fff;font-weight:700}

/* ── LEAD ROWS ── */
.lead-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.lead-row:active{background:var(--bg)}
.lead-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;flex-shrink:0}
.lead-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-sub{font-size:12px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:3px}
.s-fresh_lead{background:var(--bluel);color:var(--blue)}
.s-call_not_connected{background:var(--amberl);color:#92400e}
.s-follow_up{background:#e0e7ff;color:#3730a3}
.s-meeting_locked,.s-meeting_done{background:var(--greenl);color:#065f46}
.s-ready_to_pay{background:#bbf7d0;color:#14532d}
.s-deal_closed{background:#86efac;color:#14532d}
.s-future_budget_issue,.s-future_need_more_time,.s-future_custom_solution,.s-future_just_exploring{background:var(--amberl);color:#92400e}
.s-not_interested{background:var(--redl);color:#991b1b}

/* ── CARDS ── */
.card{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border);margin:0 12px 10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
.stat-box{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:3px}
.rpt-card{background:var(--white);border-radius:10px;padding:12px;border:1px solid var(--border)}
.rpt-num{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.04em}
.rpt-lbl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 6px}
.sec-title{font-size:14px;font-weight:700;color:var(--text)}
.sec-link{font-size:12px;color:var(--green);font-weight:600;background:none;border:none;cursor:pointer;font-family:var(--f)}

/* ── FORM ── */
.fg{margin-bottom:13px}
.flbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.finp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--f);color:var(--text);background:var(--white);outline:none}
.finp:focus{border-color:var(--green)}
.fsel{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--f);color:var(--text);background:var(--white);outline:none}
.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--f);color:var(--text);background:var(--white);outline:none;resize:vertical;min-height:72px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.btn-primary{display:flex;align-items:center;justify-content:center;padding:12px 20px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);gap:6px;width:100%}
.btn-ghost{padding:12px 20px;background:var(--bg);color:var(--sub);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);width:100%}

/* ── SHEET ── */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-ov.open{display:flex}
.sheet{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;animation:shUp .26s ease;padding-bottom:calc(var(--sb)+16px)}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#e9edef;border-radius:2px;margin:10px auto 8px}
.sheet-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1}
.sheet-title{font-size:16px;font-weight:700;color:var(--text)}
.sheet-x{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:17px;color:var(--sub);display:flex;align-items:center;justify-content:center}
.sh-body{padding:14px 16px}
.sh-foot{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);background:var(--white)}

/* ── CALL ROWS ── */
.call-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--top) 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;padding:24px;z-index:999}
.auth-card{width:100%;max-width:360px;background:var(--white);border-radius:18px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo img{height:24px}
.auth-title{font-size:19px;font-weight:800;color:var(--text);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.auth-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.auth-inp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:var(--f);color:var(--text);margin-bottom:13px;outline:none}
.auth-inp:focus{border-color:var(--green)}
.auth-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f)}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;display:none}
.auth-err.show{display:block}
.pin-box{width:42px;height:50px;border:2px solid var(--border);border-radius:9px;font-size:21px;font-weight:700;text-align:center;color:var(--text);font-family:var(--f);outline:none}
.pin-box:focus{border-color:var(--green)}
.pin-box.filled{border-color:var(--green);background:#f0fdf9}

/* ── FUNNEL ── */
.funnel-bar{display:flex;align-items:center;margin-bottom:10px}
.funnel-lbl{font-size:12px;color:var(--sub);width:120px;flex-shrink:0}
.funnel-track{flex:1;height:20px;background:var(--bg);border-radius:10px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:10px;background:var(--green);transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.funnel-val{font-size:10px;font-weight:700;color:#fff}
.funnel-n{font-size:12px;font-weight:700;color:var(--text);width:24px;text-align:right;margin-left:8px}

/* ── SIMULATOR ── */
.sim-input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-weight:700;font-family:var(--f);color:var(--text);text-align:center;outline:none;background:var(--white)}
.sim-input:focus{border-color:var(--green)}
.sim-result{text-align:center;padding:16px;background:var(--greenl);border-radius:10px;margin-top:12px}
.sim-amount{font-size:28px;font-weight:900;color:var(--green);letter-spacing:-.04em}

/* ── DATE FILTERS ── */
.date-filters{display:flex;gap:6px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none}
.date-filters::-webkit-scrollbar{display:none}
.dfchip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:var(--white);color:var(--sub);font-family:var(--f)}
.dfchip.active{background:var(--top2);border-color:var(--top2);color:#fff}

/* ── MKTG ── */
.mktg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mktg-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:background .1s}
.mktg-item:active{background:var(--bg)}
.mktg-icon{font-size:28px;margin-bottom:6px}
.mktg-name{font-size:12px;font-weight:700;color:var(--text)}
.mktg-sub{font-size:11px;color:var(--sub);margin-top:2px}

/* ── LEAD SCREEN ── */
.lead-screen{display:none;position:fixed;inset:0;z-index:700;background:var(--bg);flex-direction:column;max-width:430px;margin:0 auto;animation:slideIn .22s ease}
.lead-screen.open{display:flex}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ls-topbar{background:var(--top);padding:calc(8px + var(--st)) 10px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ls-back{width:36px;height:36px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.ls-back svg{width:22px;height:22px;stroke-width:2.5}
.ls-title{flex:1;min-width:0}
.ls-name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.ls-nav{display:flex;gap:4px;flex-shrink:0}
.ls-nav-btn{width:32px;height:32px;border:none;background:rgba(255,255,255,.08);cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;border-radius:8px}
.ls-nav-btn svg{width:16px;height:16px}
.ls-nav-btn:disabled{opacity:.25;cursor:default}
.ls-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:24px}
.ls-card{background:var(--white);padding:16px;margin-bottom:0}
.ls-sec-lbl{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.ls-info-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ls-info-row:last-child{border-bottom:none}
.ls-info-lbl{font-size:11px;font-weight:700;color:var(--muted);width:66px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em}
.ls-quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ls-quick-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;font-family:var(--f);font-size:12px;font-weight:700;width:100%}
.ls-quick-btn:active{opacity:.7}
/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--sb)+68px);left:50%;transform:translateX(-50%) translateY(12px);background:#1f2c34;color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loadingOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;align-items:center;justify-content:center}
#loadingOv.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card" id="authCardLogin">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Partner Portal</div>
    <div class="auth-sub">Enter your email to receive a sign-in code</div>
    <label class="auth-lbl">Email Address</label>
    <input class="auth-inp" id="authEmail" type="email" placeholder="you@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')doSendOTP()">
    <button class="auth-btn" id="sendOtpBtn" onclick="doSendOTP()">Send Code</button>
    <div class="auth-err" id="authErr"></div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--sub)">Questions? <a href="mailto:support@adviuz.com" style="color:var(--green)">support@adviuz.com</a></div>
  </div>
  <div class="auth-card" id="authCardOTP" style="display:none">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Check your email</div>
    <div id="otpSubText" class="auth-sub">We sent a 6-digit code</div>
    <div style="display:flex;gap:7px;justify-content:center;margin:20px 0" id="pinBoxes">
      <input type="tel" maxlength="1" class="pin-box" id="p0" oninput="pinInput(this,0)" onkeydown="pinKey(this,event,0)">
      <input type="tel" maxlength="1" class="pin-box" id="p1" oninput="pinInput(this,1)" onkeydown="pinKey(this,event,1)">
      <input type="tel" maxlength="1" class="pin-box" id="p2" oninput="pinInput(this,2)" onkeydown="pinKey(this,event,2)">
      <input type="tel" maxlength="1" class="pin-box" id="p3" oninput="pinInput(this,3)" onkeydown="pinKey(this,event,3)">
      <input type="tel" maxlength="1" class="pin-box" id="p4" oninput="pinInput(this,4)" onkeydown="pinKey(this,event,4)">
      <input type="tel" maxlength="1" class="pin-box" id="p5" oninput="pinInput(this,5)" onkeydown="pinKey(this,event,5)">
    </div>
    <button class="auth-btn" id="verifyBtn" onclick="doVerifyOTP()">Verify Code</button>
    <div class="auth-err" id="otpErr"></div>
    <div style="text-align:center;margin-top:12px;font-size:13px;color:var(--sub)">
      Didn't receive it? <button onclick="doResendOTP()" id="resendBtn" style="background:none;border:none;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f)">Resend</button><span id="resendTimer" style="font-size:12px;color:var(--sub)"></span>
    </div>
    <div style="text-align:center;margin-top:8px"><button onclick="showAuthCard('login')" style="background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;font-family:var(--f)">Different email</button></div>
  </div>
  <div class="auth-card" id="authCardSetPass" style="display:none">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Set Your Password</div>
    <div class="auth-sub">Welcome! Create a secure password for your account</div>
    <label class="auth-lbl">New Password</label>
    <input class="auth-inp" id="newPass1" type="password" placeholder="Min 8 characters" autocomplete="new-password">
    <label class="auth-lbl">Confirm Password</label>
    <input class="auth-inp" id="newPass2" type="password" placeholder="Repeat password" autocomplete="new-password">
    <button class="auth-btn" onclick="doSetPassword()">Set Password & Sign In</button>
    <div class="auth-err" id="setPassErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appShell" style="display:none">
  <!-- TOP BAR -->
  <div class="topbar">
    <img class="tb-logo" src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz">
    <div class="tb-mid" style="padding-left:8px">
      <div class="tb-ref" id="tbRef">Partner Portal</div>
      <div class="tb-rate" id="tbRate"></div>
    </div>
    <!-- + Add Lead button -->
    <button onclick="openSheet('addLeadSh')" style="background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;margin-right:6px">
      <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span style="font-size:12px;font-weight:700;color:#fff">Lead</span>
    </button>
    <button class="tb-av" id="tbAv" onclick="openSheet('profileSh')">A</button>
  </div>

  <!-- CONTENT -->
  <div class="scroll" id="content"></div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tab active" id="tab-leads" onclick="goTab('leads',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="tab-lbl">Leads</span><div class="tab-dot" id="dot-leads"></div>
    </button>
    <button class="tab" id="tab-followups" onclick="goTab('followups',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
      <span class="tab-lbl">Follow-ups</span><div class="tab-dot" id="dot-fu"></div>
    </button>
    <button class="tab" id="tab-reports" onclick="goTab('reports',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="tab-lbl">Reports</span>
    </button>
    <button class="tab" id="tab-calls" onclick="goTab('calls',this)">

// SEND OTP
async function doSendOTP(){
  var email=(document.getElementById('authEmail').value||'').trim();
  var eEl=document.getElementById('authErr');eEl.classList.remove('show');
  if(!email||!email.includes('@')){eEl.textContent='Enter a valid email';eEl.classList.add('show');return;}
  setL(true);document.getElementById('sendOtpBtn').disabled=true;
  try{
    var res=await sbA('/otp',{method:'POST',body:JSON.stringify({email:email,options:{shouldCreateUser:false}})});
    if(!res.ok){var e=await res.json();throw new Error(e.msg||e.message||'No partner account found.');}
    _otpEmail=email;
    document.getElementById('otpSubText').textContent='6-digit code sent to '+email;
    showAuthCard('otp');
    setTimeout(function(){var p=document.getElementById('p0');if(p)p.focus();},300);
    startTimer(60);
  }catch(e){eEl.textContent=e.message;eEl.classList.add('show');document.getElementById('sendOtpBtn').disabled=false;}
  finally{setL(false);}
}
async function doResendOTP(){
  document.getElementById('resendBtn').disabled=true;
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);if(p){p.value='';p.classList.remove('filled');}}
  document.getElementById('otpErr').classList.remove('show');setL(true);
  try{await sbA('/otp',{method:'POST',body:JSON.stringify({email:_otpEmail,options:{shouldCreateUser:false}})});toast('New code sent');startTimer(60);}
  catch(e){toast('Error: '+e.message);document.getElementById('resendBtn').disabled=false;}
  finally{setL(false);}
}
function startTimer(s){
  var btn=document.getElementById('resendBtn'),tel=document.getElementById('resendTimer');
  btn.style.display='none';var rem=s;tel.textContent='('+rem+'s)';
  if(_resendTO)clearInterval(_resendTO);
  _resendTO=setInterval(function(){rem--;if(rem<=0){clearInterval(_resendTO);tel.textContent='';btn.style.display='inline';btn.disabled=false;}else tel.textContent='('+rem+'s)';},1000);
}
async function doVerifyOTP(){
  var code='';for(var i=0;i<6;i++){var p=document.getElementById('p'+i);code+=(p?p.value.trim():'');}
  var eEl=document.getElementById('otpErr');eEl.classList.remove('show');
  if(code.length!==6){eEl.textContent='Enter all 6 digits';eEl.classList.add('show');return;}
  setL(true);document.getElementById('verifyBtn').disabled=true;
  try{
    var res=await sbA('/verify',{method:'POST',body:JSON.stringify({email:_otpEmail,token:code,type:'email'})});
    var d=await res.json();if(!res.ok)throw new Error(d.msg||d.message||'Invalid or expired code.');
    authToken=d.access_token;currentUser=d.user;
    // Store session using master file's exact format
    var sessionData = JSON.stringify({
      token: authToken, refresh: '', user: currentUser,
      role: 'sales_partner', remember: true, savedAt: Date.now()
    });
    localStorage.setItem('adviuz_master_session', sessionData);
    sessionStorage.setItem('adviuz_master_session', sessionData);
    // Redirect to master file — it will detect partner role and show partner UI
    window.location.replace('/master/');
  }catch(e){
    eEl.textContent=e.message;eEl.classList.add('show');
    document.getElementById('pinBoxes').style.animation='shake .3s ease';
    setTimeout(function(){document.getElementById('pinBoxes').style.animation='';},400);
    document.getElementById('verifyBtn').disabled=false;
  }finally{setL(false);}
}
function pinInput(el,idx){
  el.value=el.value.replace(/[^0-9]/g,'');
  if(el.value){el.classList.add('filled');var n=document.getElementById('p'+(idx+1));if(n)n.focus();
    var c='';for(var i=0;i<6;i++){var p=document.getElementById('p'+i);c+=(p?p.value:'');}if(c.length===6)setTimeout(doVerifyOTP,300);}
  else el.classList.remove('filled');
}
function pinKey(el,e,idx){
  if(e.key==='Backspace'&&!el.value){var pr=document.getElementById('p'+(idx-1));if(pr){pr.value='';pr.classList.remove('filled');pr.focus();}}
  if(e.key==='ArrowLeft'&&idx>0)document.getElementById('p'+(idx-1)).focus();
  if(e.key==='ArrowRight'&&idx<5)document.getElementById('p'+(idx+1)).focus();
}
async function doSetPassword(){
  var p1=document.getElementById('newPass1').value,p2=document.getElementById('newPass2').value;
  var eEl=document.getElementById('setPassErr');eEl.classList.remove('show');
  if(p1.length<8){eEl.textContent='Min 8 characters';eEl.classList.add('show');return;}
  if(p1!==p2){eEl.textContent='Passwords do not match';eEl.classList.add('show');return;}
  setL(true);
  try{
    var res=await fetch(SB_URL+'/auth/v1/user',{method:'PUT',headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+authToken},body:JSON.stringify({password:p1})});
    var d=await res.json();if(!res.ok)throw new Error(d.message||'Failed');
    toast('Password set!');await loadData();
  }catch(e){eEl.textContent=e.message;eEl.classList.add('show');}
  finally{setL(false);}
}

// LOAD DATA
async function loadData(){
  setL(true);
  try{
    var pR=await sbF('/rest/v1/sales_partners?user_id=eq.'+currentUser.id+'&limit=1');
    var pA=pR.ok?await pR.json():[];
    if(!pA.length){var pR2=await sbF('/rest/v1/sales_partners?email=eq.'+encodeURIComponent(currentUser.email)+'&limit=1');pA=pR2.ok?await pR2.json():[];}
    if(!pA.length)throw new Error('No partner account found. Contact relations@adviuz.com');
    partnerData=pA[0];
    var [lR,cR]=await Promise.allSettled([
      sbF('/rest/v1/leads?partner_id=eq.'+partnerData.id+'&order=created_at.desc&limit=200'),
      sbF('/rest/v1/partner_commissions?partner_id=eq.'+partnerData.id+'&order=earned_at.desc&limit=100')
    ]);
    myLeads=lR.status==='fulfilled'&&lR.value.ok?await lR.value.json():[];
    myComms=cR.status==='fulfilled'&&cR.value.ok?await cR.value.json():[];

    document.getElementById('appShell').style.display='flex';

  }catch(e){setL(false);alert(e.message);doLogout();}

}

function rRate(n){if(n<=10)return'5%';if(n<=20)return'6%';if(n<=35)return'7%';if(n<=50)return'8%';if(n<=75)return'9%';return'10%';}

async function updStage(id,s){

// SAVE NEW LEAD
async function saveNewLead(){
  var fn=(document.getElementById('aFn').value||'').trim();
  var ph=(document.getElementById('aPhCC').value||'+1')+(document.getElementById('aPh').value||'').trim();
  if(!fn){toast('First name required');return;}
  if(!document.getElementById('aPh').value.trim()||document.getElementById('aPh').value.trim().length<10){toast('Valid 10-digit phone required');return;}
  setL(true);
  try{
    var payload={
      name:fn+' '+(document.getElementById('aLn').value||'').trim(),
      company:document.getElementById('aCompany').value||null,
      phone:ph,email:document.getElementById('aEm').value||null,
      location:(document.getElementById('aCity').value||'')+(document.getElementById('aProv').value?' '+document.getElementById('aProv').value:''),
      source:document.getElementById('aSrc').value,
      stage_code:document.getElementById('aStg').value||'fresh_lead',
      notes:document.getElementById('aNt').value||null,
      partner_id:partnerData.id,is_direct:false,
      stage_changed_at:new Date().toISOString(),last_activity_at:new Date().toISOString(),created_at:new Date().toISOString()
    };
    var res=await sbF('/rest/v1/leads',{method:'POST',body:JSON.stringify(payload)});
    if(!res.ok&&res.status!==201){var e=await res.json();throw new Error(e.message||'Failed to add lead');}
    var newLead=await res.json();
    if(Array.isArray(newLead))newLead=newLead[0];
    myLeads.unshift(newLead);
    closeSheet('addLeadSh');
    ['aFn','aLn','aCompany','aPh','aEm','aCity','aNt'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
    toast('Lead added ✅');
    goTab('leads',document.getElementById('tab-leads'));
  }catch(e){toast('❌ '+e.message);}
  finally{setL(false);}
}

function setDFilter(k){_dashFilter=k;document.getElementById('content').innerHTML=dashboardHTML();}

function getDateRange(filter){
  var now=new Date(),start=new Date();
  if(filter==='today'){start=new Date(now.getFullYear(),now.getMonth(),now.getDate());}
  else if(filter==='yesterday'){start=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1);now=new Date(now.getFullYear(),now.getMonth(),now.getDate());}
  else if(filter==='7days'){start=new Date(Date.now()-7*86400000);}
  else{start=new Date(now.getFullYear(),now.getMonth(),1);}
  return{start:start.toISOString(),end:now.toISOString()};
}

    +'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--sub)">Active clients</span><span style="font-size:13px;font-weight:700;color:var(--text)">'+(p.active_client_count||0)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:13px;color:var(--sub)">Recurring rate</span><span style="font-size:13px;font-weight:700;color:var(--green)">'+rRate(p.active_client_count||0)+'</span></div>'
    +'</div>';
  h+='<div style="display:flex;gap:8px">'
    +'<a href="mailto:support@adviuz.com" style="flex:1;padding:11px;background:var(--bg);border-radius:8px;text-align:center;text-decoration:none;font-size:13px;font-weight:600;color:var(--text)">📧 Support</a>'
    +'<button onclick="doLogout()" style="flex:1;padding:11px;background:var(--redl);border:none;border-radius:8px;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;font-family:var(--f)">Sign Out</button>'
    +'</div>';
  document.getElementById('profileContent').innerHTML=h;
}

// LOGOUT
function doLogout(){authToken=null;currentUser=null;partnerData=null;myLeads=[];myComms=[];myCalls=[];localStorage.removeItem('ps');document.getElementById('appShell').style.display='none';document.getElementById('authScreen').style.display='flex';showAuthCard('login');}

// INIT
(async function init(){
  var hash=window.location.hash.replace(/^#/,''),params={};
  hash.split('&').forEach(function(pair){var pts=pair.split('=');if(pts.length>=2)params[decodeURIComponent(pts[0])]=decodeURIComponent(pts.slice(1).join('='));});
  var at=params['access_token']||'',tt=params['type']||'';
  if(at&&(tt==='recovery'||tt==='invite'||tt==='signup')){authToken=at;history.replaceState(null,'',window.location.pathname);document.getElementById('authScreen').style.display='flex';showAuthCard('setPassword');return;}
  var saved=localStorage.getItem('ps');
  if(saved){
    try{var s=JSON.parse(saved);authToken=s.t;currentUser=s.u;var me=await sbA('/user');if(me.ok){currentUser=await me.json();await loadData();return;}}
    catch(e){}localStorage.removeItem('ps');
  }
  document.getElementById('authScreen').style.display='flex';showAuthCard('login');
})();

// Intercept profile sheet open to render content
var _origOpen=openSheet;
openSheet=function(id){
  if(id==='profileSh')renderProfileSheet();
  _origOpen(id);
};

// Auto-run simulator on dashboard load
var _origGoTab=goTab;
goTab=function(name,el){
  _origGoTab(name,el);
  if(name==='dashboard')setTimeout(calcSimulator,100);
};
</script>
