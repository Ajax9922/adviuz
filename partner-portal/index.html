<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<title>Adviuz Partner Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#00a884;--navy:#001f3f;--text:#111827;--sub:#6b7280;--border:#e5e7eb;--red:#ef4444;--f:'Segoe UI',Arial,sans-serif}
body{font-family:var(--f);background:linear-gradient(160deg,var(--navy) 0%,#1e3a5f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:360px;background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:22px}.logo img{height:26px}
.title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px}
.sub{font-size:13px;color:var(--sub);margin-bottom:22px;line-height:1.5}
.lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--f);color:var(--text);margin-bottom:14px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--green)}
.btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;display:none;line-height:1.5}
.err.show{display:block}
.help{text-align:center;margin-top:16px;font-size:12px;color:var(--sub)}
.pins{display:flex;gap:8px;justify-content:center;margin:20px 0}
.pin{width:44px;height:52px;border:2px solid var(--border);border-radius:10px;font-size:22px;font-weight:700;text-align:center;color:var(--text);font-family:var(--f);outline:none;transition:border .15s}
.pin:focus{border-color:var(--green)}.pin.filled{border-color:var(--green);background:#f0fdf9}
.lnk{background:none;border:none;font-family:var(--f);cursor:pointer}
.spinner{width:40px;height:40px;border:3px solid rgba(0,168,132,.2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>

  <div id="s1">
    <div class="title">Partner Portal</div>
    <div class="sub">Enter your email and we'll send a 6-digit sign-in code</div>
    <label class="lbl">Email Address</label>
    <input class="inp" id="emailInp" type="email" placeholder="you@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')sendCode()">
    <button class="btn" id="sendBtn" onclick="sendCode()">Send Code</button>
    <div class="err" id="err1"></div>
    <div class="help">Questions? <a href="mailto:support@adviuz.com" style="color:var(--green)">support@adviuz.com</a></div>
  </div>

  <div id="s2" style="display:none">
    <div class="title">Check your email</div>
    <div class="sub" id="codeSent">We sent a 6-digit code</div>
    <div class="pins" id="pinsWrap">
      <input type="tel" maxlength="1" class="pin" id="p0" oninput="pi(this,0)" onkeydown="pk(this,event,0)">
      <input type="tel" maxlength="1" class="pin" id="p1" oninput="pi(this,1)" onkeydown="pk(this,event,1)">
      <input type="tel" maxlength="1" class="pin" id="p2" oninput="pi(this,2)" onkeydown="pk(this,event,2)">
      <input type="tel" maxlength="1" class="pin" id="p3" oninput="pi(this,3)" onkeydown="pk(this,event,3)">
      <input type="tel" maxlength="1" class="pin" id="p4" oninput="pi(this,4)" onkeydown="pk(this,event,4)">
      <input type="tel" maxlength="1" class="pin" id="p5" oninput="pi(this,5)" onkeydown="pk(this,event,5)">
    </div>
    <button class="btn" id="verifyBtn" onclick="verifyCode()">Verify Code</button>
    <div class="err" id="err2"></div>
    <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--sub)">
      Didn't receive it? <button class="lnk" id="resendBtn" onclick="resend()" style="color:var(--green);font-size:13px;font-weight:700">Resend</button>
      <span id="timer" style="font-size:12px;color:var(--sub)"></span>
    </div>
    <div style="text-align:center;margin-top:8px"><button class="lnk" onclick="goBack()" style="color:var(--sub);font-size:12px">← Different email</button></div>
  </div>

  <div id="s3" style="display:none;text-align:center">
    <div class="spinner"></div>
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">Verified!</div>
    <div style="font-size:13px;color:var(--sub)">Opening your dashboard...</div>
  </div>
</div>

<script>
var SB='https://crhvvfomwkrgwlnfruad.supabase.co';
var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaHZ2Zm9td2tyZ3dsbmZydWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA3MDYsImV4cCI6MjA5Mjc5NjcwNn0.lTHjU0bHTGGiTPJl04iefIenI6KiqiS3u2h_WyHZ0aw';
var _email='',_tTO=null;

function show(id){['s1','s2','s3'].forEach(function(s){document.getElementById(s).style.display=s===id?'block':'none';});}
function err1(m){var e=document.getElementById('err1');e.textContent=m;e.classList.add('show');}
function err2(m){var e=document.getElementById('err2');e.textContent=m;e.classList.add('show');}

async function sendCode(){
  var email=(document.getElementById('emailInp').value||'').trim();
  document.getElementById('err1').classList.remove('show');
  if(!email||!email.includes('@')){err1('Enter a valid email address');return;}
  var btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='Sending...';
  try{
    var r=await fetch(SB+'/auth/v1/otp',{method:'POST',headers:{'Content-Type':'application/json','apikey':AK},body:JSON.stringify({email:email,options:{shouldCreateUser:false}})});
    if(!r.ok){var e=await r.json();throw new Error(e.msg||e.message||'No partner account found for this email. Contact relations@adviuz.com');}
    _email=email;
    document.getElementById('codeSent').textContent='We sent a 6-digit code to '+email;
    show('s2');
    setTimeout(function(){document.getElementById('p0').focus();},200);
    startTimer(60);
  }catch(e){err1(e.message);btn.disabled=false;btn.textContent='Send Code';}
}

async function verifyCode(){
  var code='';
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);code+=(p?p.value.trim():'');}
  document.getElementById('err2').classList.remove('show');
  if(code.length!==6){err2('Enter all 6 digits');return;}
  var btn=document.getElementById('verifyBtn');
  btn.disabled=true;btn.textContent='Verifying...';
  try{
    var r=await fetch(SB+'/auth/v1/verify',{method:'POST',headers:{'Content-Type':'application/json','apikey':AK},body:JSON.stringify({email:_email,token:code,type:'email'})});
    var d=await r.json();
    if(!r.ok)throw new Error(d.msg||d.message||'Invalid or expired code. Try again.');

    // Save session in master file format
    var sess=JSON.stringify({token:d.access_token,refresh:d.refresh_token||'',user:d.user,role:'sales_partner',remember:true,savedAt:Date.now()});
    localStorage.setItem('adviuz_master_session',sess);
    sessionStorage.setItem('adviuz_master_session',sess);

    show('s3');
    setTimeout(function(){window.location.href='https://latest-promo.com/master/';},800);
  }catch(e){
    err2(e.message);
    document.getElementById('pinsWrap').style.animation='shake .3s ease';
    setTimeout(function(){document.getElementById('pinsWrap').style.animation='';},400);
    btn.disabled=false;btn.textContent='Verify Code';
  }
}

function pi(el,idx){
  el.value=el.value.replace(/[^0-9]/g,'');
  if(el.value){el.classList.add('filled');var n=document.getElementById('p'+(idx+1));if(n)n.focus();
    var c='';for(var i=0;i<6;i++){var p=document.getElementById('p'+i);c+=(p?p.value:'');}if(c.length===6)setTimeout(verifyCode,300);}
  else el.classList.remove('filled');
}
function pk(el,e,idx){
  if(e.key==='Backspace'&&!el.value){var pr=document.getElementById('p'+(idx-1));if(pr){pr.value='';pr.classList.remove('filled');pr.focus();}}
  if(e.key==='ArrowLeft'&&idx>0)document.getElementById('p'+(idx-1)).focus();
  if(e.key==='ArrowRight'&&idx<5)document.getElementById('p'+(idx+1)).focus();
}
async function resend(){
  document.getElementById('resendBtn').disabled=true;
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);if(p){p.value='';p.classList.remove('filled');}}
  document.getElementById('err2').classList.remove('show');
  await fetch(SB+'/auth/v1/otp',{method:'POST',headers:{'Content-Type':'application/json','apikey':AK},body:JSON.stringify({email:_email,options:{shouldCreateUser:false}})});
  startTimer(60);
  setTimeout(function(){document.getElementById('p0').focus();},100);
}
function startTimer(s){
  var btn=document.getElementById('resendBtn'),tel=document.getElementById('timer');
  btn.style.display='none';var rem=s;tel.textContent='('+rem+'s)';
  if(_tTO)clearInterval(_tTO);
  _tTO=setInterval(function(){rem--;if(rem<=0){clearInterval(_tTO);tel.textContent='';btn.style.display='inline';btn.disabled=false;}else tel.textContent='('+rem+'s)';},1000);
}
function goBack(){if(_tTO)clearInterval(_tTO);show('s1');document.getElementById('sendBtn').disabled=false;document.getElementById('sendBtn').textContent='Send Code';}

// Auto-redirect if already has valid partner session
(function(){
  try{
    var raw=localStorage.getItem('adviuz_master_session');
    if(!raw)return;
    var s=JSON.parse(raw);
    if(s&&s.token&&s.role==='sales_partner'&&(Date.now()-s.savedAt)<7*24*60*60*1000){
      show('s3');
      setTimeout(function(){window.location.href='https://latest-promo.com/master/';},400);
    }
  }catch(e){}
})();
</script>
</body>
</html>
