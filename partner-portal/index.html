<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Adviuz Partner</title>
<style>
:root{--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);--bg:#f0f2f5;--white:#fff;--border:#e9edef;--text:#111b21;--sub:#667781;--muted:#8696a0;--top:#1f2c34;--top2:#2a3942;--green:#00a884;--greenl:#d9fdd3;--amber:#f59e0b;--amberl:#fef3c7;--red:#ef4444;--redl:#fee2e2;--f:'Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;font-family:var(--f);background:var(--bg);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg)}
.topbar{background:var(--top);padding:calc(var(--st) + 10px) 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-logo{height:22px;display:block}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.tb-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px}
.tb-av{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;cursor:pointer;flex-shrink:0;border:none}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tabbar{background:var(--white);display:flex;flex-shrink:0;padding-bottom:var(--sb);border-top:1px solid var(--border)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--f);position:relative}
.tab.active{color:var(--green)}
.tab svg{width:22px;height:22px;stroke-width:1.8;margin-bottom:3px}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.02em}
.tab-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--green);border:2px solid var(--white);display:none}
.filter-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{padding:5px 12px;border-radius:20px;white-space:nowrap;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;border:1.5px solid var(--border);background:var(--white);color:var(--sub)}
.fchip.active{background:var(--top2);border-color:var(--top2);color:#fff;font-weight:700}
.lead-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer}
.lead-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;flex-shrink:0}
.lead-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-sub{font-size:12px;color:var(--sub);margin-top:2px}
.stage-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:3px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;margin-bottom:0}
.stat-box{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:3px}
.card{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border);margin:0 12px 10px}
.rpt-card{background:var(--white);border-radius:10px;padding:12px;border:1px solid var(--border)}
.rpt-num{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.04em}
.rpt-lbl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.form-field{margin-bottom:13px}
.form-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--f);color:var(--text);background:var(--white);outline:none}
.form-input:focus{border-color:var(--green)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f)}
.call-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.comm-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--white)}
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-ov.open{display:flex}
.sheet{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;animation:shUp .26s ease;padding-bottom:calc(var(--sb) + 16px)}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#e9edef;border-radius:2px;margin:10px auto 8px}
#authScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--top) 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;padding:24px;z-index:999}
.auth-card{width:100%;max-width:360px;background:var(--white);border-radius:18px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo img{height:24px}
.auth-title{font-size:19px;font-weight:800;color:var(--text);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.auth-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.auth-inp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:var(--f);color:var(--text);margin-bottom:13px;outline:none}
.auth-inp:focus{border-color:var(--green)}
.auth-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f)}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;display:none}
.auth-err.show{display:block}
.pin-box{width:42px;height:50px;border:2px solid var(--border);border-radius:9px;font-size:21px;font-weight:700;text-align:center;color:var(--text);font-family:var(--f);outline:none}
.pin-box:focus{border-color:var(--green)}
.pin-box.filled{border-color:var(--green);background:#f0fdf9}
#toast{position:fixed;bottom:calc(var(--sb) + 68px);left:50%;transform:translateX(-50%) translateY(12px);background:#1f2c34;color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loadingOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;align-items:center;justify-content:center}
#loadingOv.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.stage-fresh_lead{background:#dbeafe;color:#1e40af}
.stage-call_not_connected{background:#fef3c7;color:#92400e}
.stage-follow_up{background:#e0e7ff;color:#3730a3}
.stage-meeting_locked,.stage-meeting_done{background:#d1fae5;color:#065f46}
.stage-ready_to_pay{background:#bbf7d0;color:#14532d}
.stage-deal_closed{background:#86efac;color:#14532d}
.stage-future_budget_issue,.stage-future_need_more_time,.stage-future_custom_solution,.stage-future_just_exploring{background:#fef3c7;color:#92400e}
.stage-not_interested{background:#fee2e2;color:#991b1b}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 6px}
.sec-title{font-size:14px;font-weight:700;color:var(--text)}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card" id="authCardLogin">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Partner Portal</div>
    <div class="auth-sub">Enter your email — we'll send a 6-digit sign-in code</div>
    <label class="auth-lbl">Email Address</label>
    <input class="auth-inp" id="authEmail" type="email" placeholder="you@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')doSendOTP()">
    <button class="auth-btn" id="sendOtpBtn" onclick="doSendOTP()">Send Code →</button>
    <div class="auth-err" id="authErr"></div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--sub)">Questions? <a href="mailto:support@adviuz.com" style="color:var(--green)">support@adviuz.com</a></div>
  </div>
  <div class="auth-card" id="authCardOTP" style="display:none">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Check your email</div>
    <div id="otpSubText" class="auth-sub">We sent a 6-digit code</div>
    <div style="display:flex;gap:7px;justify-content:center;margin:20px 0" id="pinBoxes">
      <input type="tel" maxlength="1" class="pin-box" id="p0" oninput="pinInput(this,0)" onkeydown="pinKey(this,event,0)">
      <input type="tel" maxlength="1" class="pin-box" id="p1" oninput="pinInput(this,1)" onkeydown="pinKey(this,event,1)">
      <input type="tel" maxlength="1" class="pin-box" id="p2" oninput="pinInput(this,2)" onkeydown="pinKey(this,event,2)">
      <input type="tel" maxlength="1" class="pin-box" id="p3" oninput="pinInput(this,3)" onkeydown="pinKey(this,event,3)">
      <input type="tel" maxlength="1" class="pin-box" id="p4" oninput="pinInput(this,4)" onkeydown="pinKey(this,event,4)">
      <input type="tel" maxlength="1" class="pin-box" id="p5" oninput="pinInput(this,5)" onkeydown="pinKey(this,event,5)">
    </div>
    <button class="auth-btn" id="verifyBtn" onclick="doVerifyOTP()">Verify Code →</button>
    <div class="auth-err" id="otpErr"></div>
    <div style="text-align:center;margin-top:12px;font-size:13px;color:var(--sub)">
      Didn't receive it? <button onclick="doResendOTP()" id="resendBtn" style="background:none;border:none;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f)">Resend</button><span id="resendTimer" style="font-size:12px;color:var(--sub)"></span>
    </div>
    <div style="text-align:center;margin-top:8px"><button onclick="showAuthCard('login')" style="background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;font-family:var(--f)">← Different email</button></div>
  </div>
  <div class="auth-card" id="authCardSetPass" style="display:none">
    <div class="auth-logo"><img src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz"></div>
    <div class="auth-title">Set Your Password</div>
    <div class="auth-sub">Welcome! Choose a secure password for your account</div>
    <label class="auth-lbl">New Password</label>
    <input class="auth-inp" id="newPass1" type="password" placeholder="Min 8 characters" autocomplete="new-password">
    <label class="auth-lbl">Confirm Password</label>
    <input class="auth-inp" id="newPass2" type="password" placeholder="Repeat password" autocomplete="new-password">
    <button class="auth-btn" onclick="doSetPassword()">Set Password & Sign In →</button>
    <div class="auth-err" id="setPassErr"></div>
  </div>
</div>

<div class="app" id="appShell" style="display:none">
  <div class="topbar">
    <img class="tb-logo" src="https://i.imgur.com/rfPAzdI.png" alt="Adviuz">
    <div style="flex:1;padding-left:8px">
      <div style="font-size:15px;font-weight:700;color:#fff" id="tbTitle">Partner Portal</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5)" id="tbSub">Loading...</div>
    </div>
    <div class="tb-right">
      <span class="tb-badge" id="tbBadge" style="display:none"></span>
      <button class="tb-av" id="tbAv" onclick="goTab('dashboard',document.getElementById('tab-dashboard'))">A</button>
    </div>
  </div>
  <div class="scroll" id="content"></div>
  <div class="tabbar">
    <button class="tab active" id="tab-leads" onclick="goTab('leads',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="tab-lbl">Leads</span><div class="tab-dot" id="dot-leads"></div>
    </button>
    <button class="tab" id="tab-followups" onclick="goTab('followups',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
      <span class="tab-lbl">Follow-ups</span>
    </button>
    <button class="tab" id="tab-register" onclick="goTab('register',this)">
      <div style="width:46px;height:46px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin-top:-14px;border:3px solid var(--bg)">+</div>
      <span class="tab-lbl">Register</span>
    </button>
    <button class="tab" id="tab-calls" onclick="goTab('calls',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 01.11 2.38 2 2 0 012.11.5h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.09a16 16 0 006 6l.66-.65a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <span class="tab-lbl">Calls</span>
    </button>
    <button class="tab" id="tab-dashboard" onclick="goTab('dashboard',this)">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="tab-lbl">Dashboard</span>
    </button>
  </div>
</div>

<div class="sheet-ov" id="leadSheet" onclick="if(event.target===this)closeSheet('leadSheet')">
  <div class="sheet"><div class="sheet-handle"></div><div id="leadSheetContent" style="padding:0 16px 16px"></div></div>
</div>

<div id="toast"></div>
<div id="loadingOv"><div class="spinner"></div></div>

<script>
var SB_URL='https://crhvvfomwkrgwlnfruad.supabase.co';
var SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaHZ2Zm9td2tyZ3dsbmZydWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA3MDYsImV4cCI6MjA5Mjc5NjcwNn0.lTHjU0bHTGGiTPJl04iefIenI6KiqiS3u2h_WyHZ0aw';
var authToken=null,currentUser=null,partnerData=null,myLeads=[],myComms=[],myCalls=[];
var _curTab='leads',_leadFilter='',_otpEmail='',_resendTO=null;
var AV_COLS=['#00a884','#2563eb','#7c3aed','#d97706','#0891b2','#db2777'];

async function sbAuth(path,opts){return fetch(SB_URL+'/auth/v1'+path,{...opts,headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+(authToken||SB_ANON),...(opts&&opts.headers||{})}});}
async function sbFetch(path,opts){return fetch(SB_URL+path,{...opts,headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+(authToken||SB_ANON),'Prefer':'return=representation',...(opts&&opts.headers||{})}});}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function setLoading(on){document.getElementById('loadingOv').classList.toggle('show',on);}

function showAuthCard(which){
  ['authCardLogin','authCardOTP','authCardSetPass'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});
  var m={login:'authCardLogin',otp:'authCardOTP',setPassword:'authCardSetPass'};
  var el=document.getElementById(m[which]||which);if(el)el.style.display='block';
}

async function doSendOTP(){
  var email=(document.getElementById('authEmail').value||'').trim();
  var errEl=document.getElementById('authErr');errEl.classList.remove('show');
  if(!email||!email.includes('@')){errEl.textContent='Enter a valid email';errEl.classList.add('show');return;}
  setLoading(true);document.getElementById('sendOtpBtn').disabled=true;
  try{
    var res=await sbAuth('/otp',{method:'POST',body:JSON.stringify({email:email,options:{shouldCreateUser:false}})});
    if(!res.ok){var e=await res.json();throw new Error(e.msg||e.message||'No partner account found.');}
    _otpEmail=email;
    document.getElementById('otpSubText').textContent='We sent a 6-digit code to '+email;
    showAuthCard('otp');
    setTimeout(function(){var p=document.getElementById('p0');if(p)p.focus();},300);
    startResendTimer(60);
  }catch(e){errEl.textContent=e.message;errEl.classList.add('show');document.getElementById('sendOtpBtn').disabled=false;}
  finally{setLoading(false);}
}

async function doResendOTP(){
  document.getElementById('resendBtn').disabled=true;
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);if(p){p.value='';p.classList.remove('filled');}}
  document.getElementById('otpErr').classList.remove('show');setLoading(true);
  try{await sbAuth('/otp',{method:'POST',body:JSON.stringify({email:_otpEmail,options:{shouldCreateUser:false}})});showToast('New code sent');startResendTimer(60);setTimeout(function(){document.getElementById('p0').focus();},200);}
  catch(e){showToast('Error: '+e.message);document.getElementById('resendBtn').disabled=false;}
  finally{setLoading(false);}
}

function startResendTimer(sec){
  var btn=document.getElementById('resendBtn'),timerEl=document.getElementById('resendTimer');
  btn.style.display='none';var rem=sec;timerEl.textContent='('+rem+'s)';
  if(_resendTO)clearInterval(_resendTO);
  _resendTO=setInterval(function(){rem--;if(rem<=0){clearInterval(_resendTO);timerEl.textContent='';btn.style.display='inline';btn.disabled=false;}else timerEl.textContent='('+rem+'s)';},1000);
}

async function doVerifyOTP(){
  var code='';for(var i=0;i<6;i++){var p=document.getElementById('p'+i);code+=(p?p.value.trim():'');}
  var errEl=document.getElementById('otpErr');errEl.classList.remove('show');
  if(code.length!==6){errEl.textContent='Enter all 6 digits';errEl.classList.add('show');return;}
  setLoading(true);document.getElementById('verifyBtn').disabled=true;
  try{
    var res=await sbAuth('/verify',{method:'POST',body:JSON.stringify({email:_otpEmail,token:code,type:'email'})});
    var data=await res.json();
    if(!res.ok)throw new Error(data.msg||data.message||'Invalid or expired code.');
    authToken=data.access_token;currentUser=data.user;
    localStorage.setItem('partner_session',JSON.stringify({token:authToken,user:currentUser}));
    await loadPartnerData();
  }catch(e){
    errEl.textContent=e.message;errEl.classList.add('show');
    document.getElementById('pinBoxes').style.animation='shake .3s ease';
    setTimeout(function(){document.getElementById('pinBoxes').style.animation='';},400);
    document.getElementById('verifyBtn').disabled=false;
  }finally{setLoading(false);}
}

function pinInput(el,idx){
  el.value=el.value.replace(/[^0-9]/g,'');
  if(el.value){el.classList.add('filled');var next=document.getElementById('p'+(idx+1));if(next)next.focus();
    var code='';for(var i=0;i<6;i++){var p=document.getElementById('p'+i);code+=(p?p.value:'');}if(code.length===6)setTimeout(doVerifyOTP,300);}
  else el.classList.remove('filled');
}
function pinKey(el,e,idx){
  if(e.key==='Backspace'&&!el.value){var prev=document.getElementById('p'+(idx-1));if(prev){prev.value='';prev.classList.remove('filled');prev.focus();}}
  if(e.key==='ArrowLeft'&&idx>0)document.getElementById('p'+(idx-1)).focus();
  if(e.key==='ArrowRight'&&idx<5)document.getElementById('p'+(idx+1)).focus();
}

async function doSetPassword(){
  var p1=document.getElementById('newPass1').value,p2=document.getElementById('newPass2').value;
  var errEl=document.getElementById('setPassErr');errEl.classList.remove('show');
  if(p1.length<8){errEl.textContent='At least 8 characters';errEl.classList.add('show');return;}
  if(p1!==p2){errEl.textContent='Passwords do not match';errEl.classList.add('show');return;}
  setLoading(true);
  try{
    var res=await fetch(SB_URL+'/auth/v1/user',{method:'PUT',headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+authToken},body:JSON.stringify({password:p1})});
    var data=await res.json();if(!res.ok)throw new Error(data.message||'Failed');

  }catch(e){errEl.textContent=e.message;errEl.classList.add('show');}

async function loadPartnerData(){
  setLoading(true);
  try{
    var pRes=await sbFetch('/rest/v1/sales_partners?user_id=eq.'+currentUser.id+'&limit=1');
    var pArr=pRes.ok?await pRes.json():[];
    if(!pArr.length){var pRes2=await sbFetch('/rest/v1/sales_partners?email=eq.'+encodeURIComponent(currentUser.email)+'&limit=1');pArr=pRes2.ok?await pRes2.json():[];}
    if(!pArr.length)throw new Error('No partner account found for this email. Contact relations@adviuz.com');
    partnerData=pArr[0];
    var [lR,cR]=await Promise.allSettled([
      sbFetch('/rest/v1/leads?partner_id=eq.'+partnerData.id+'&order=created_at.desc&limit=100'),
      sbFetch('/rest/v1/partner_commissions?partner_id=eq.'+partnerData.id+'&order=earned_at.desc&limit=100')
    ]);
    myLeads=lR.status==='fulfilled'&&lR.value.ok?await lR.value.json():[];
    myComms=cR.status==='fulfilled'&&cR.value.ok?await cR.value.json():[];
    renderApp();
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appShell').style.display='flex';
    goTab('leads',document.getElementById('tab-leads'));
  }catch(e){setLoading(false);alert(e.message);doLogout();}
  finally{setLoading(false);}
}

function getRecurRate(n){if(n<=10)return'5%';if(n<=20)return'6%';if(n<=35)return'7%';if(n<=50)return'8%';if(n<=75)return'9%';return'10%';}
function avCol(name){return AV_COLS[(name||'A').charCodeAt(0)%AV_COLS.length];}
function stageLabel(s){var m={fresh_lead:'Fresh Lead',call_not_connected:'Not Connected',follow_up:'Follow-up',meeting_locked:'Meeting Booked',meeting_done:'Meeting Done',ready_to_pay:'Ready to Pay',deal_closed:'Closed',future_budget_issue:'Budget Issue',future_need_more_time:'More Time',future_custom_solution:'Custom Needed',future_just_exploring:'Exploring',not_interested:'Not Interested',partnership_inquiry:'Partnership',job_inquiry:'Job Inquiry',duplicate_lead:'Duplicate'};return m[s]||s;}

function renderApp(){
  if(!partnerData)return;
  var p=partnerData,firstName=(p.full_name||'Partner').split(' ')[0];
  var rate=getRecurRate(p.active_client_count||0);
  var stCol=p.status==='active'?'var(--green)':p.status==='warning'?'var(--amber)':'var(--red)';
  document.getElementById('tbTitle').textContent=firstName+"'s Portal";
  document.getElementById('tbSub').textContent=(p.ref_code||'')+' · '+rate+' recurring';
  document.getElementById('tbAv').textContent=firstName.charAt(0).toUpperCase();
  var badge=document.getElementById('tbBadge');
  badge.textContent=p.status||'active';badge.style.background=stCol+'20';badge.style.color=stCol;badge.style.display='inline-block';
  var openLeads=myLeads.filter(function(l){return l.stage_code!=='deal_closed'&&l.stage_code!=='not_interested';}).length;
  var dot=document.getElementById('dot-leads');if(openLeads>0)dot.style.display='block';
}

function goTab(name,el){
  _curTab=name;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
  var c=document.getElementById('content');
  if(name==='leads')c.innerHTML=renderLeadsHTML();
  else if(name==='followups')c.innerHTML=renderFollowupsHTML();
  else if(name==='register')c.innerHTML=renderRegisterHTML();
  else if(name==='calls')c.innerHTML=renderCallsHTML();
  else if(name==='dashboard')c.innerHTML=renderDashboardHTML();
  c.scrollTop=0;
}

async function updateLeadStage(lid,stage){

async function registerLead(){
  if(!partnerData)return;
  var company=(document.getElementById('reg-company').value||'').trim();
  var name=(document.getElementById('reg-name').value||'').trim();
  var city=(document.getElementById('reg-city').value||'').trim();
  var prov=document.getElementById('reg-province').value;
  var email=(document.getElementById('reg-email').value||'').trim();
  var phone=(document.getElementById('reg-phone').value||'').trim();
  var notes=(document.getElementById('reg-notes').value||'').trim();
  if(!city){showToast('Please enter a city');return;}
  if(!email&&!phone&&!company){showToast('Provide email, phone, or company');return;}
  setLoading(true);var rEl=document.getElementById('regResult');
  try{
    var res=await sbFetch('/functions/v1/register-lead',{method:'POST',body:JSON.stringify({partner_id:partnerData.id,contact_name:name,contact_email:email,contact_phone:phone,company_name:company,city:city,province:prov,notes:notes})});
    var data=await res.json();
    if(data.blocked){rEl.style.cssText='display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:8px;padding:12px';rEl.textContent='❌ '+data.message;return;}
    if(!res.ok)throw new Error(data.error||'Failed');
    rEl.style.cssText='display:block;background:var(--greenl);color:#065f46;border:1px solid #6ee7b7;border-radius:8px;padding:12px';
    rEl.innerHTML='✅ <b>'+(company||name)+'</b> registered! Lock expires: '+new Date(data.lock_expires_at).toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric'});
    ['reg-company','reg-name','reg-city','reg-email','reg-phone','reg-notes'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('reg-province').value='';
    var lRes=await sbFetch('/rest/v1/leads?partner_id=eq.'+partnerData.id+'&order=created_at.desc&limit=100');
    myLeads=lRes.ok?await lRes.json():myLeads;
  }catch(e){rEl.style.cssText='display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:8px;padding:12px';rEl.textContent='❌ '+e.message;}
  finally{setLoading(false);}
}

    +'<div style="font-size:12px;color:var(--sub)">'+(p.email||'')+'</div>'
    +'<div style="font-size:12px;color:var(--sub)">'+(p.city||'')+(p.province?', '+p.province:'')+'</div></div></div>'
    +'<div style="display:flex;gap:8px">'
    +'<a href="mailto:support@adviuz.com" style="flex:1;padding:9px;background:var(--bg);border-radius:8px;text-align:center;text-decoration:none;font-size:12px;font-weight:600;color:var(--text)">📧 Support</a>'
    +'<button onclick="doLogout()" style="flex:1;padding:9px;background:#fee2e2;border:none;border-radius:8px;font-size:12px;font-weight:700;color:var(--red);cursor:pointer;font-family:var(--f)">Sign Out</button>'
    +'</div></div>';
  return h+'</div>';
}

function copyRefLink(){var url=partnerData?(partnerData.ref_url||'https://latest-promo.com/?ref='+partnerData.ref_code):'';if(!url)return;navigator.clipboard.writeText(url).then(function(){showToast('Referral link copied!');});}

function doLogout(){authToken=null;currentUser=null;partnerData=null;myLeads=[];myComms=[];myCalls=[];localStorage.removeItem('partner_session');document.getElementById('appShell').style.display='none';document.getElementById('authScreen').style.display='flex';showAuthCard('login');}

(async function init(){
  var hash=window.location.hash.replace(/^#/,''),params={};
  hash.split('&').forEach(function(pair){var pts=pair.split('=');if(pts.length>=2)params[decodeURIComponent(pts[0])]=decodeURIComponent(pts.slice(1).join('='));});
  var accessToken=params['access_token']||'',tokenType=params['type']||'';
  if(accessToken&&(tokenType==='recovery'||tokenType==='invite'||tokenType==='signup')){
    authToken=accessToken;history.replaceState(null,'',window.location.pathname);
    document.getElementById('authScreen').style.display='flex';showAuthCard('setPassword');return;
  }
  var saved=localStorage.getItem('partner_session');
  if(saved){
    try{var session=JSON.parse(saved);authToken=session.token;currentUser=session.user;var me=await sbAuth('/user');if(me.ok){currentUser=await me.json();await loadPartnerData();return;}}
    catch(e){}localStorage.removeItem('partner_session');
  }
  document.getElementById('authScreen').style.display='flex';showAuthCard('login');
})();
</script>
