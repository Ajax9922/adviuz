<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quote | Adviuz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a884;--dark:#0f1e2c;--text:#111b21;--sub:#667781;--muted:#aab8c0;--border:#e2e8f0;--bg:#f7f8fa;--white:#fff;--red:#dc2626;--f:"Inter",system-ui,sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--dark);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-actions{display:flex;align-items:center;gap:8px}
.tb-btn{padding:8px 14px;border-radius:9px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;transition:background .1s}
.tb-btn:active{background:rgba(255,255,255,.15)}
.tb-btn.whatsapp{background:#25D366;border-color:#25D366}
.tb-btn.whatsapp:active{background:#1da851}
.logo-mark{width:32px;height:32px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff}
.logo-text{color:#fff;font-size:16px;font-weight:800}
.logo-sub{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.q-badge{color:#fff;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
.status-pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700}
.s-draft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.s-sent,.s-viewed{background:#dbeafe;color:#1d4ed8}
.s-accepted{background:#d1fae5;color:#065f46}
.s-paid{background:var(--green);color:#fff}
.s-rejected,.s-expired{background:#fee2e2;color:#dc2626}
.wrap{max-width:760px;margin:0 auto;padding:28px 16px 80px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-body{padding:22px 24px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.q-header{display:flex;gap:20px;flex-wrap:wrap}
.q-meta{flex:1;min-width:180px}
.q-num{font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px}
.q-dates{font-size:13px;color:var(--sub);line-height:2}
.q-dates strong{color:var(--text)}
.prepared{flex:1;min-width:180px;background:var(--bg);border-radius:10px;padding:16px}
.biz-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}
.biz-addr{font-size:13px;color:var(--sub);line-height:1.7}
.items-table{width:100%;border-collapse:collapse}
.items-table thead td{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 0;border-bottom:1px solid var(--border)}
.items-table thead td:last-child{text-align:right}
.items-table tbody td{padding:14px 0;font-size:14px;color:var(--text);border-bottom:1px solid var(--border)}
.items-table tbody td:last-child{text-align:right;font-weight:700}
.items-table tbody tr:last-child td{border-bottom:none}
.totals{margin-top:16px;border-top:2px solid var(--text)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.total-row.grand{padding-top:12px;border-top:1px solid var(--border);font-size:18px;font-weight:900;color:var(--text)}
.pay-section{background:var(--dark);border-radius:14px;padding:24px;text-align:center;margin-bottom:14px}
.pay-amount-lbl{color:rgba(255,255,255,.5);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.pay-total{color:#fff;font-size:32px;font-weight:900;margin-bottom:20px}
.btn-pay{display:block;padding:16px;border-radius:12px;background:var(--green);color:#fff;border:none;font-family:var(--f);font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;transition:opacity .1s}
.btn-accept{display:block;padding:12px;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;width:100%}
.secure-note{font-size:11px;color:rgba(255,255,255,.3);margin-top:12px}
.paid-banner{background:linear-gradient(135deg,#065f46,#047857);border-radius:14px;padding:28px;text-align:center;margin-bottom:14px}
.paid-icon{font-size:44px;margin-bottom:10px}
.paid-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.paid-sub{font-size:14px;color:rgba(255,255,255,.75)}
.sched-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
.sched-row:last-child{border-bottom:none}
.bank-table{width:100%;border-collapse:collapse}
.bank-table tr td{padding:9px 0;font-size:13px;border-bottom:1px solid var(--bg)}
.bank-table tr td:first-child{color:var(--sub);width:45%}
.bank-table tr td:last-child{font-weight:700;color:var(--text);text-align:right}
.bank-table tr:last-child td{border-bottom:none}
.bank-ref{background:var(--bg);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--sub);margin-top:12px;line-height:1.6}
.footer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px 24px;background:var(--bg);border-top:1px solid var(--border)}
.footer-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.footer-val{font-size:12px;color:var(--sub);line-height:1.9}
.footer-bottom{padding:14px 24px;text-align:center;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.error-card{background:#fee2e2;border-radius:14px;padding:32px;text-align:center;margin:40px 0}
.share-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:12px;font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;border:none;transition:opacity .15s;white-space:nowrap}
.share-btn:active{opacity:.8}
.share-btn.pdf{background:#1e293b;color:#fff}
.share-btn.wa{background:#25D366;color:#fff}
.share-btn.copy{background:#f1f5f9;color:var(--text);border:1.5px solid var(--border)}
@media print{
  .topbar,.share-row,#topbarActions,.btn-accept,.secure-note{display:none!important}
  .pay-section{background:#f8f9fa!important;border:1px solid #e2e8f0!important}
  .pay-total,.pay-amount-lbl{color:#111b21!important}
  body{background:#fff!important}
  .card{box-shadow:none!important}
  .btn-pay{background:#00a884!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:480px){.q-header{flex-direction:column}.footer-grid{grid-template-columns:1fr}.pay-total{font-size:26px}.share-row{grid-template-columns:1fr}}
</style>
</head>

<script>
var SB_URL  = "https://crhvvfomwkrgwlnfruad.supabase.co";
var SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaHZ2Zm9td2tyZ3dsbmZydWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA3MDYsImV4cCI6MjA5Mjc5NjcwNn0.lTHjU0bHTGGiTPJl04iefIenI6KiqiS3u2h_WyHZ0aw";

function fmtCAD(n){ return "$"+Math.abs(parseFloat(n||0)).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(str){ if(!str)return""; return new Date(str).toLocaleDateString("en-CA",{day:"2-digit",month:"short",year:"numeric"}); }

var PROV_TAX = {
  SK:{rate:0.11,label:"GST+PST (11%)"},AB:{rate:0.05,label:"GST (5%)"},
  ON:{rate:0.13,label:"HST (13%)"},BC:{rate:0.12,label:"GST+PST (12%)"},
  MB:{rate:0.12,label:"GST+PST (12%)"},QC:{rate:0.14975,label:"GST+QST (14.975%)"},
  NB:{rate:0.15,label:"HST (15%)"},NS:{rate:0.15,label:"HST (15%)"},
  NL:{rate:0.15,label:"HST (15%)"},PE:{rate:0.15,label:"HST (15%)"},
  NT:{rate:0.05,label:"GST (5%)"},NU:{rate:0.05,label:"GST (5%)"},YT:{rate:0.05,label:"GST (5%)"}
};

var quoteId  = new URLSearchParams(window.location.search).get("id");
var justPaid = new URLSearchParams(window.location.search).get("paid") === "1";

async function loadQuote(){
  if(!quoteId){ showError("No quote ID","Please use the link from your email."); return; }
  try{
    var res = await fetch(SB_URL+"/rest/v1/quotes?id=eq."+quoteId+"&select=*",{
      headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON}
    });
    var data = await res.json();
    if(!data||!data.length){ showError("Quote not found","This link may be expired or invalid."); return; }
    var q = data[0];
    if(justPaid && q.status!=="paid"){
      await fetch(SB_URL+"/rest/v1/quotes?id=eq."+quoteId,{
        method:"PATCH",
        headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
        body:JSON.stringify({status:"paid",paid_at:new Date().toISOString()})
      });
      q.status = "paid";
    }
    if(q.status==="sent"){
      fetch(SB_URL+"/rest/v1/quotes?id=eq."+quoteId,{
        method:"PATCH",
        headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
        body:JSON.stringify({status:"viewed",viewed_at:new Date().toISOString()})
      });
      // Log to activity timeline
      if(q.lead_id) {
        fetch(SB_URL+"/rest/v1/activity_log",{
          method:"POST",
          headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
          body:JSON.stringify({
            lead_id:q.lead_id, client_id:q.client_id||null,
            type:"quote_viewed", label:"Quote Viewed",
            body:"👁 Client opened quote "+q.quote_number,
            meta:{quote_id:quoteId, quote_number:q.quote_number},
            created_at:new Date().toISOString()
          })
        });
      }
    }
    renderQuote(q);
  }catch(e){ showError("Failed to load","Please try again or contact sales@adviuz.ca"); }
}

function renderQuote(q){
  var sMap={draft:"Draft",sent:"Sent",viewed:"Viewed",accepted:"Accepted",paid:"Paid",rejected:"Declined",expired:"Expired"};
  var sCls={draft:"s-draft",sent:"s-sent",viewed:"s-viewed",accepted:"s-accepted",paid:"s-paid",rejected:"s-rejected",expired:"s-expired"};
  var pill=document.getElementById("statusPill");
  pill.textContent=sMap[q.status]||q.status;
  pill.className="status-pill "+(sCls[q.status]||"s-draft");

  var items=q.items||[];
  var province=q.recipient_province||"SK";
  var taxRule=PROV_TAX[province]||PROV_TAX["SK"];
  var sub=q.subtotal||items.reduce(function(s,i){return s+(i.total||i.amount||0);},0);
  var discount=q.discount_amount||0;
  var subAfter=Math.max(0,sub-discount);
  var taxAmt=q.tax_amount||(subAfter*taxRule.rate);
  var total=q.total||(subAfter+taxAmt);
  var isPaid=q.status==="paid";
  var isExp=q.status==="expired"||(q.valid_until&&new Date(q.valid_until)<new Date());
  var canPay=!isPaid&&!isExp&&q.status!=="rejected";
  var html="";

  if(isPaid){
    html+="<div class='paid-banner'><div class='paid-icon'>&#x2705;</div>"
      +"<div class='paid-title'>Payment Received!</div>"
      +"<div class='paid-sub'>Thank you. Your payment is confirmed. An invoice will be emailed to "+q.recipient_email+"</div></div>";
  }

  // Quote summary + prepared for
  html+="<div class='card'><div class='card-body'><div class='q-header'>"
    +"<div class='q-meta'>"
      +"<div class='section-title'>Quote Summary</div>"
      +"<div class='q-num'>Quote #"+q.quote_number+"</div>"
      +"<div class='q-dates'>"
        +"<strong>Date:</strong> "+fmtDate(q.created_at)+"<br>"
        +(q.valid_until?"<strong>Valid Until:</strong> "+fmtDate(q.valid_until)+"<br>":"")
        +"<strong>Terms:</strong> "+(q.payment_terms||"Due on Receipt")
      +"</div>"
    +"</div>"
    +"<div class='prepared'>"
      +"<div class='section-title'>Prepared For</div>"
      +"<div class='biz-name'>"+(q.recipient_biz||q.recipient_name)+"</div>"
      +"<div class='biz-addr'>"+(province||"")+"<br>"+q.recipient_email+"</div>"
    +"</div>"
    +"</div></div></div>";

  // Line items
  html+="<div class='card'><div class='card-body'>"
    +"<table class='items-table'><thead><tr><td>Description</td><td>Amount (CAD)</td></tr></thead><tbody>";
  items.forEach(function(item){
    html+="<tr><td>"+(item.qty&&item.qty>1?item.qty+" X ":"")+item.name
      +(item.description?"<div style='font-size:12px;color:var(--sub);margin-top:3px'>"+item.description+"</div>":"")
      +"</td><td>"+fmtCAD(item.total||item.amount||item.unit_price*item.qty)+"</td></tr>";
  });

  html+="<div class='total-row'><span style='color:var(--sub)'>Subtotal</span><span style='font-weight:600'>"+fmtCAD(sub)+"</span></div>";
  if(discount>0) html+="<div class='total-row' style='color:var(--red)'><span>Discount</span><span>- "+fmtCAD(discount)+"</span></div>";
  html+="<div class='total-row'><span style='color:var(--sub)'>Taxable Amount</span><span style='font-weight:600'>"+fmtCAD(subAfter)+"</span></div>";
  html+="<div class='total-row'><span style='color:var(--sub)'>Tax ("+taxRule.label+")</span><span style='font-weight:600'>"+fmtCAD(taxAmt)+"</span></div>";
  html+="<div class='total-row'><span style='color:var(--sub)'>Total Contract Value</span><span style='font-weight:600'>"+fmtCAD(total)+"</span></div>";
  html+="<div class='total-row grand'><span>Amount Due Now</span><span>"+fmtCAD(total)+" CAD</span></div>";
  html+="</div></div></div>";

  // Pay section
  if(canPay){
    html+="<div class='pay-section'>"
      +"<div class='pay-amount-lbl'>Total Amount Due</div>"
      +"<div class='pay-total'>"+fmtCAD(total)+"</div>"
      +"<button class='btn-pay' id='stripePayBtn' data-qid='"+q.id+"' onclick='payWithStripe(this.dataset.qid)'>&#x1F4B3; Pay Now &#x2192; Secure online payment</button>"
      +"<a href='#' data-qid='"+q.id+"' onclick='acceptQuote(this.dataset.qid); return false;' class='btn-accept'>&#x2714; Accept &mdash; I will pay via e-transfer or bank transfer</a>"
      +"<div class='secure-note'>&#x1F512; Secure payment &bull; CAD only &bull; All major cards accepted</div>"
      +"</div>";
  } else if(isPaid){
    html+="<div style='background:var(--green);border-radius:14px;padding:20px 24px;text-align:center;margin-bottom:14px'>"
      +"<div style='color:#fff;font-weight:700;font-size:16px'>&#x2705; Payment Complete</div>"
      +"<div style='color:rgba(255,255,255,.8);font-size:13px;margin-top:4px'>Invoice emailed to "+q.recipient_email+"</div></div>";
  } else if(isExp){
    html+="<div class='error-card'><div style='font-size:18px;font-weight:700;color:var(--red);margin-bottom:8px'>Quote Expired</div>"
      +"<div style='font-size:13px;color:#92400e'>Contact <a href='mailto:sales@adviuz.com' style='color:var(--red)'>sales@adviuz.com</a> for an updated quote.</div></div>";
  }

  // Share row — always visible
  html+="<div class='share-row'>"
    +"<button class='share-btn pdf' onclick='downloadPDF()'>&#x1F4E5; Download PDF</button>"
    +"<a id='waBtn' href='#' class='share-btn wa' target='_blank'>&#x1F4AC; WhatsApp</a>"
    +"<button class='share-btn copy' onclick='copyQuoteLink()'>&#x1F517; Copy Link</button>"
    +"</div>";

  // Notes
  if(q.notes){
    html+="<div class='card'><div class='card-body'>"
      +"<div class='section-title'>Notes</div>"
      +"<div style='font-size:14px;color:var(--sub);line-height:1.8'>"+(q.notes||"").split("\n").join("<br>")+"</div>"
      +"</div></div>";
  }

  // Payment schedule — show installments if multiple
  var schedule = q.installment_schedule || [];
  var numInstall = q.installments || 1;
  html+="<div class='card'><div class='card-body'>"
    +"<div class='section-title'>Payment Schedule</div>";
  if(schedule.length > 1) {
    schedule.forEach(function(inst) {
      var instDue = inst.due_date ? new Date(inst.due_date).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}) : '';
      var isPaidInst = inst.status === 'paid';
      html+="<div class='sched-row'>"
        +"<div><div style='font-weight:700;font-size:14px;color:var(--text)'>Payment "+inst.number+"</div>"
        +"<div style='font-size:12px;color:var(--sub)'>Due: "+instDue+"</div></div>"
        +"<div style='display:flex;align-items:center;gap:10px'>"
        +"<div style='font-weight:800;font-size:14px;color:var(--text)'>"+fmtCAD(inst.amount)+"</div>"
        +(isPaidInst?"<span style='font-size:11px;font-weight:700;color:var(--green)'>✓ PAID</span>":"")
        +"</div>"
        +"</div>";
    });
    html+="<div style='margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--sub)'>"
      +"<span>"+numInstall+" payments total</span>"
      +"<span>"+fmtCAD(total)+" CAD</span>"
      +"</div>";
  } else {
    html+="<div class='sched-row'>"
      +"<div><div style='font-weight:700;font-size:14px;color:var(--text)'>Payment 1</div>"
      +"<div style='font-size:12px;color:var(--sub)'>Due: "+fmtDate(q.created_at)+"</div></div>"
      +"<div style='font-weight:800;font-size:14px;color:var(--text)'>"+fmtCAD(total)+"</div>"
      +"</div>";
  }
  html+="</div></div>";

  // Bank transfer
  html+="<div class='card'><div class='card-body'>"
    +"<div class='section-title'>Bank Transfer / E-Transfer Details</div>"
    +"<div style='background:#f0fdf9;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#065f46'>"
    +"&#x1F4B8; <strong>E-Transfer:</strong> Send to <strong>sales@adviuz.ca</strong> &mdash; use Quote # as reference</div>"
    +"<table class='bank-table'>"
    +"<tr><td>Account Name</td><td>Instad Web Services Limited</td></tr>"
    +"<tr><td>Bank Name</td><td>TD Canada Trust</td></tr>"
    +"<tr><td>Account Number</td><td>5016709</td></tr>"
    +"<tr><td>Transit Number</td><td>77348</td></tr>"
    +"<tr><td>Institution Number</td><td>004</td></tr>"
    +"<tr><td>SWIFT Code</td><td>TDOMCATTOR</td></tr>"
    +"<tr><td>Branch Address</td><td>3003 Clarence Ave S, Saskatoon, SK, S7T 0B4</td></tr>"
    +"</table>"
    +"<div class='bank-ref'>Please mention <strong>Quote #"+q.quote_number+"</strong> in the transfer reference.</div>"
    +"</div></div>";

  // Footer
  html+="<div class='card' style='overflow:hidden'>"
    +"<div class='footer-grid'>"
    +"<div><div class='footer-lbl'>Tax Details</div><div class='footer-val'>GST: 746780360RT0001<br>PST: 8234833</div></div>"
    +"<div><div class='footer-lbl'>North America</div><div class='footer-val'>Instad Web Services Ltd<br>329, 125 Stonebridge Common<br>Saskatoon, SK S7T 0Z5<br>Canada</div></div>"
    +"<div><div class='footer-lbl'>Contact</div><div class='footer-val'><a href='https://adviuz.ca' style='color:var(--green)'>adviuz.ca</a><br><a href='mailto:sales@adviuz.ca' style='color:var(--green)'>sales@adviuz.ca</a></div></div>"
    +"</div>"
    +"<div class='footer-bottom'>Generated: "+new Date().toLocaleString("en-CA",{dateStyle:"medium",timeStyle:"short"})+" &bull; This is a system generated quote and does not require a signature.</div>"
    +"</div>";

  document.getElementById("main").innerHTML = html;

  // Show action buttons and set up WhatsApp
  var actions = document.getElementById("topbarActions");
  if(actions) actions.style.display = "flex";
  setupWhatsAppShare(q, total);
}

async function payWithStripe(qid){
  var btn=document.getElementById("stripePayBtn");
  if(btn){btn.textContent="Connecting to Stripe...";btn.style.opacity=".7";btn.disabled=true;}
  try{
    var res=await fetch(SB_URL+"/functions/v1/stripe-checkout",{
      method:"POST",
      headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
      body:JSON.stringify({quote_id:qid})
    });
    var data=await res.json();
    if(data.error)throw new Error(data.error);
    window.location.href=data.checkout_url;
  }catch(e){
    if(btn){btn.textContent="Pay Now \u2192 Secure online payment";btn.style.opacity="1";btn.disabled=false;}
    alert("Payment error: "+e.message+"\n\nPlease use bank transfer or contact sales@adviuz.ca");
  }
}

async function acceptQuote(qid){
  if(!confirm("Accept this quote and pay via e-transfer or bank transfer?\n\nOur team will follow up to confirm your payment."))return;
  await fetch(SB_URL+"/rest/v1/quotes?id=eq."+qid,{
    method:"PATCH",
    headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
    body:JSON.stringify({status:"accepted",accepted_at:new Date().toISOString()})
  });
  document.getElementById("statusPill").textContent="Accepted";
  document.getElementById("statusPill").className="status-pill s-accepted";
  // Log to activity
  var qData = await fetch(SB_URL+"/rest/v1/quotes?id=eq."+qid+"&select=lead_id,client_id,quote_number,total",{
    headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON}
  }).then(function(r){return r.json();}).then(function(d){return d[0];}).catch(function(){return null;});
  if(qData && qData.lead_id) {
    fetch(SB_URL+"/rest/v1/activity_log",{
      method:"POST",
      headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON,"Content-Type":"application/json"},
      body:JSON.stringify({
        lead_id:qData.lead_id, client_id:qData.client_id||null,
        type:"quote_accepted", label:"Quote Accepted",
        body:"✅ Client accepted quote "+qData.quote_number+" — will pay via e-transfer/bank transfer",
        meta:{quote_id:qid},
        created_at:new Date().toISOString()
      })
    });
  }
  alert("Quote accepted!\n\nOur team will be in touch within 24 hours.\n\nE-Transfer to: sales@adviuz.ca\nReference: "+qid.slice(0,8));
}

function showError(title,sub){
  document.getElementById("main").innerHTML="<div class='error-card'><div style='font-size:18px;font-weight:700;color:var(--red);margin-bottom:8px'>"+title+"</div><div style='font-size:13px;color:#92400e'>"+sub+"</div></div>";
  document.getElementById("statusPill").textContent="Error";
}

// ── PDF DOWNLOAD ──
function downloadPDF(){
  // Use browser print-to-PDF with clean styles
  var btn = document.getElementById("topbarActions");
  if(btn) btn.style.display="none";
  window.print();
  setTimeout(function(){ if(btn) btn.style.display="flex"; }, 1000);
}

// ── WHATSAPP SHARE ──
function setupWhatsAppShare(q, total){
  var qUrl = window.location.origin + "/quote/?id=" + q.id;
  var totalFmt = "$" + parseFloat(total).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2}) + " CAD";
  var msg = "Hi! Please find your quote from Adviuz."
    + "\n\n*Quote #" + q.quote_number + "*"
    + "\n*" + (q.recipient_biz||q.recipient_name) + "*"
    + "\n*Amount:* " + totalFmt
    + (q.valid_until ? "\n*Valid Until:* " + new Date(q.valid_until).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"}) : "")
    + "\n\n*View & Pay Online:*\n" + qUrl
    + "\n\n_Pay securely by card, or e-transfer to sales@adviuz.ca with quote # as reference._";
  var waUrl = "https://wa.me/?text=" + encodeURIComponent(msg);
  // Topbar button
  var waTopBtn = document.getElementById("waShareBtn");
  if(waTopBtn){ waTopBtn.href = waUrl; waTopBtn.target = "_blank"; }
  // Inline button
  var waInlineBtn = document.getElementById("waBtn");
  if(waInlineBtn){ waInlineBtn.href = waUrl; waInlineBtn.target = "_blank"; }
}

// ── COPY LINK ──
function copyQuoteLink(){
  var url = window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      showCopyToast();
    });
  } else {
    var el = document.createElement("textarea");
    el.value = url; document.body.appendChild(el);
    el.select(); document.execCommand("copy");
    document.body.removeChild(el);
    showCopyToast();
  }
}
function showCopyToast(){
  var t = document.createElement("div");
  t.textContent = "Link copied!";
  t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111b21;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;font-family:var(--f)";
  document.body.appendChild(t);
  setTimeout(function(){ document.body.removeChild(t); }, 2000);
}

loadQuote();
