<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quote | Adviuz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00a884;--text:#111b21;--sub:#667781;--muted:#aab8c0;
  --border:#e9edef;--bg:#f0f2f5;--white:#fff;--red:#cc0000;
  --f:'Inter',system-ui,sans-serif;
}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh}

/* ── TOPBAR ── */
.topbar{background:#1f2c34;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--green);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff}
.logo-name{font-size:16px;font-weight:800;color:#fff}
.logo-tag{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
.status-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
.s-draft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.s-sent{background:#dbeafe;color:#1d4ed8}
.s-viewed{background:#fef3c7;color:#92400e}
.s-accepted{background:#d1fae5;color:#065f46}
.s-paid{background:#00a884;color:#fff}
.s-rejected{background:#fee2e2;color:#cc0000}
.s-expired{background:#f3f4f6;color:#6b7280}

/* ── MAIN ── */
.wrap{max-width:720px;margin:0 auto;padding:32px 16px 80px}

/* ── QUOTE HEADER ── */
.qhead{background:var(--white);border-radius:16px;padding:28px;margin-bottom:16px;
  border:1px solid var(--border)}
.qhead-top{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:20px;gap:16px;flex-wrap:wrap}
.q-biz{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.q-num{font-size:14px;color:var(--sub);font-weight:600}
.q-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;
  border-top:1px solid var(--border);padding-top:20px}
@media(max-width:480px){.q-meta-grid{grid-template-columns:1fr}}
.q-meta-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:4px}
.q-meta-val{font-size:14px;font-weight:600;color:var(--text)}
.q-meta-sub{font-size:12px;color:var(--sub);margin-top:2px}

/* ── LINE ITEMS ── */
.items-card{background:var(--white);border-radius:16px;padding:24px;
  margin-bottom:16px;border:1px solid var(--border)}
.items-title{font-size:13px;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
.item-row{display:grid;grid-template-columns:1fr auto;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none;padding-bottom:0}
.item-name{font-size:14px;font-weight:700;color:var(--text)}
.item-desc{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.5}
.item-qty{font-size:12px;color:var(--muted);margin-top:4px}
.item-price{text-align:right;flex-shrink:0}
.item-unit{font-size:11px;color:var(--muted);margin-bottom:2px}
.item-total{font-size:15px;font-weight:800;color:var(--text)}

/* ── TOTALS ── */
.totals{margin-top:20px;border-top:2px solid var(--text);padding-top:16px}
.total-row{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;font-size:14px}
.total-row.main{margin-top:12px;border-top:1px solid var(--border);
  padding-top:12px;font-size:18px;font-weight:800;color:var(--text)}
.total-label{color:var(--sub)}
.total-val{font-weight:600;color:var(--text)}

/* ── TERMS ── */
.terms-card{background:var(--white);border-radius:16px;padding:24px;
  margin-bottom:16px;border:1px solid var(--border)}
.terms-label{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.terms-text{font-size:13px;color:var(--sub);line-height:1.7}

/* ── CTA ── */
.cta-card{background:var(--white);border-radius:16px;padding:24px;
  border:1px solid var(--border);text-align:center}
.cta-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.cta-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.6}
.btn-pay{display:block;width:100%;padding:16px;border-radius:12px;
  background:var(--green);color:#fff;border:none;font-family:var(--f);
  font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;
  text-decoration:none;transition:opacity .1s}
.btn-pay:active{opacity:.85}
.btn-accept{display:block;width:100%;padding:14px;border-radius:12px;
  background:transparent;color:var(--green);border:2px solid var(--green);
  font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;
  text-decoration:none;transition:opacity .1s}
.btn-accept:active{opacity:.75}
.btn-reject{display:block;width:100%;padding:12px;border-radius:12px;
  background:transparent;color:var(--muted);border:1.5px solid var(--border);
  font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;
  margin-top:8px;text-decoration:none}
.secure-note{font-size:11px;color:var(--muted);margin-top:12px}

/* ── PAID ── */
.paid-banner{background:linear-gradient(135deg,#065f46,#047857);
  border-radius:16px;padding:28px;text-align:center;margin-bottom:16px}
.paid-icon{font-size:48px;margin-bottom:12px}
.paid-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.paid-sub{font-size:14px;color:rgba(255,255,255,.75)}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:80px 24px;color:var(--sub)}
.loading-icon{font-size:40px;margin-bottom:16px}
.error-card{background:#fee2e2;border-radius:16px;padding:32px;text-align:center}
.error-title{font-size:18px;font-weight:700;color:var(--red);margin-bottom:8px}
.error-sub{font-size:13px;color:#92400e}

/* Stripe secure badge */
.stripe-badge{display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark">A</div>
    <div>
      <div class="logo-name">Adviuz</div>
      <div class="logo-tag">AI Sales Engine</div>
    </div>
  </div>
  <div id="statusPill" class="status-pill s-draft">Loading...</div>
</div>

<!-- MAIN CONTENT -->
<div class="wrap" id="main">
  <div class="loading">
    <div class="loading-icon">&#x231B;</div>
    <div>Loading your quote...</div>
  </div>
</div>

<script>
var SB_URL = 'https://crhvvfomwkrgwlnfruad.supabase.co';
var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaHZ2Zm9td2tyZ3dsbmZydWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA3MDYsImV4cCI6MjA5Mjc5NjcwNn0.lTHjU0bHTGGiTPJl04iefIenI6KiqiS3u2h_WyHZ0aw';

// Saskatoon time (CST = UTC-6, no DST)
var CST_OFFSET = -6;
function toCST(utcDateStr) {
  var d = new Date(utcDateStr);
  var cst = new Date(d.getTime() + CST_OFFSET * 60 * 60 * 1000);
  return cst.toLocaleDateString('en-CA', {year:'numeric',month:'long',day:'numeric'});
}

function fmtCAD(amount) {
  return 'CAD $' + parseFloat(amount || 0).toLocaleString('en-CA',
    {minimumFractionDigits:2, maximumFractionDigits:2});
}

var quoteId = new URLSearchParams(window.location.search).get('id');

async function loadQuote() {
  if (!quoteId) {
    showError('No quote ID provided', 'Please use the link from your email.');
    return;
  }

  try {
    var res = await fetch(SB_URL + '/rest/v1/quotes?id=eq.' + quoteId + '&select=*', {
      headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON }
    });
    var data = await res.json();
    if (!data || !data.length) {
      showError('Quote not found', 'This quote may have expired or the link is invalid.');
      return;
    }
    var q = data[0];

    // Mark as viewed
    if (q.status === 'sent') {
      fetch(SB_URL + '/rest/v1/quotes?id=eq.' + quoteId, {
        method: 'PATCH',
        headers: {
          'apikey': SB_ANON,
          'Authorization': 'Bearer ' + SB_ANON,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ status: 'viewed', viewed_at: new Date().toISOString() })
      });
    }

    renderQuote(q);
  } catch(e) {
    showError('Failed to load quote', e.message);
  }
}

function renderQuote(q) {
  // Update status pill
  var pill = document.getElementById('statusPill');
  var statusLabels = {
    draft:'Draft', sent:'Sent', viewed:'Viewed', accepted:'Accepted',
    paid:'Paid', rejected:'Rejected', expired:'Expired'
  };
  var statusClasses = {
    draft:'s-draft', sent:'s-sent', viewed:'s-viewed', accepted:'s-accepted',
    paid:'s-paid', rejected:'s-rejected', expired:'s-expired'
  };
  pill.textContent = statusLabels[q.status] || q.status;
  pill.className = 'status-pill ' + (statusClasses[q.status] || 's-draft');

  var items = q.items || [];
  var isPaid = q.status === 'paid';
  var isExpired = q.status === 'expired' || (q.valid_until && new Date(q.valid_until) < new Date());
  var canAct = !isPaid && !isExpired && q.status !== 'rejected';

  var html = '';

  // Paid banner
  if (isPaid) {
    html += '<div class="paid-banner">'
      + '<div class="paid-icon">&#x2705;</div>'
      + '<div class="paid-title">Payment Received!</div>'
      + '<div class="paid-sub">Thank you. Your payment has been confirmed. We\'ll be in touch shortly.</div>'
      + '</div>';
  }

  // Quote header
  html += '<div class="qhead">'
    + '<div class="qhead-top">'
      + '<div>'
        + '<div class="q-biz">' + (q.recipient_biz || q.recipient_name) + '</div>'
        + '<div class="q-num">Quote ' + q.quote_number + '</div>'
      + '</div>'
    + '</div>'
    + '<div class="q-meta-grid">'
      + metaBlock('Prepared For', q.recipient_name, q.recipient_email)
      + metaBlock('From', 'Adviuz', 'sales@adviuz.ca')
      + metaBlock('Date', toCST(q.created_at), '')
      + metaBlock('Valid Until', q.valid_until ? toCST(q.valid_until) : 'Until withdrawn', q.payment_terms)
    + '</div>'
  + '</div>';

  // Line items
  html += '<div class="items-card">'
    + '<div class="items-title">Services &amp; Products</div>';

  items.forEach(function(item) {
    html += '<div class="item-row">'
      + '<div>'
        + '<div class="item-name">' + item.name + '</div>'
        + (item.description ? '<div class="item-desc">' + item.description + '</div>' : '')
        + (item.qty > 1 ? '<div class="item-qty">Qty: ' + item.qty + '</div>' : '')
      + '</div>'
      + '<div class="item-price">'
        + (item.qty > 1 ? '<div class="item-unit">@ ' + fmtCAD(item.unit_price) + ' each</div>' : '')
        + '<div class="item-total">' + fmtCAD(item.total) + '</div>'
      + '</div>'
    + '</div>';
  });

  // Totals
  html += '<div class="totals">';
  html += '<div class="total-row"><span class="total-label">Subtotal</span><span class="total-val">' + fmtCAD(q.subtotal) + '</span></div>';
  if (q.tax_rate > 0) {
    html += '<div class="total-row"><span class="total-label">GST/HST (' + q.tax_rate + '%)</span><span class="total-val">' + fmtCAD(q.tax_amount) + '</span></div>';
  }
  html += '<div class="total-row main"><span>Total Due</span><span>' + fmtCAD(q.total) + ' CAD</span></div>';
  html += '</div></div>';

  // Notes
  if (q.notes) {
    html += '<div class="terms-card">'
      + '<div class="terms-label">Notes</div>'
      + '<div class="terms-text">' + q.notes.replace(/\n/g,'<br>') + '</div>'
    + '</div>';
  }

  // Terms
  if (q.terms) {
    html += '<div class="terms-card">'
      + '<div class="terms-label">Terms &amp; Conditions</div>'
      + '<div class="terms-text">' + q.terms.replace(/\n/g,'<br>') + '</div>'
    + '</div>';
  }

  // CTA
  if (canAct) {
    html += '<div class="cta-card">'
      + '<div class="cta-title">Ready to proceed?</div>'
      + '<div class="cta-sub">Review the quote above and choose how you\'d like to proceed.</div>';

    if (q.stripe_payment_link) {
      html += '<a href="' + q.stripe_payment_link + '" class="btn-pay">&#x1F4B3; Accept &amp; Pay Online</a>';
      html += '<div class="stripe-badge">&#x1F512; Secure payment via Stripe &mdash; CAD ' + parseFloat(q.total).toFixed(2) + '</div>';
    }

    html += '<a href="#" onclick="acceptQuote(\'' + q.id + '\'); return false;" class="btn-accept">&#x2714; Accept (Pay Later / Offline)</a>';
    html += '<a href="#" onclick="rejectQuote(\'' + q.id + '\'); return false;" class="btn-reject">&#x2715; Decline this quote</a>';
    html += '</div>';
  } else if (isPaid) {
    html += '<div class="cta-card">'
      + '<div class="cta-title">All done!</div>'
      + '<div class="cta-sub">Your payment is confirmed. Our team will reach out within 24 hours to get started.<br><br>Questions? <a href="mailto:sales@adviuz.ca" style="color:var(--green)">sales@adviuz.ca</a></div>'
    + '</div>';
  } else if (isExpired) {
    html += '<div class="error-card">'
      + '<div class="error-title">Quote Expired</div>'
      + '<div class="error-sub">This quote is no longer valid. Please contact us for an updated quote.<br><br><a href="mailto:sales@adviuz.ca" style="color:var(--red)">sales@adviuz.ca</a></div>'
    + '</div>';
  } else if (q.status === 'rejected') {
    html += '<div class="terms-card">'
      + '<div style="text-align:center;padding:12px;color:var(--sub)">You declined this quote. Contact us if you change your mind.<br><a href="mailto:sales@adviuz.ca" style="color:var(--green)">sales@adviuz.ca</a></div>'
    + '</div>';
  }

  document.getElementById('main').innerHTML = html;
}

function metaBlock(label, val, sub) {
  return '<div>'
    + '<div class="q-meta-label">' + label + '</div>'
    + '<div class="q-meta-val">' + val + '</div>'
    + (sub ? '<div class="q-meta-sub">' + sub + '</div>' : '')
  + '</div>';
}

async function acceptQuote(id) {
  if (!confirm('Accept this quote? Our team will contact you to arrange payment.')) return;
  await fetch(SB_URL + '/rest/v1/quotes?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ status: 'accepted', accepted_at: new Date().toISOString() })
  });
  document.getElementById('main').innerHTML =
    '<div class="paid-banner" style="margin-top:32px">'
    + '<div class="paid-icon">&#x1F44D;</div>'
    + '<div class="paid-title">Quote Accepted!</div>'
    + '<div class="paid-sub">Thank you! Our team will be in touch within 24 hours to arrange payment and get started.</div>'
    + '</div>';
  document.getElementById('statusPill').textContent = 'Accepted';
  document.getElementById('statusPill').className = 'status-pill s-accepted';
}

async function rejectQuote(id) {
  if (!confirm('Decline this quote? You can always contact us to discuss.')) return;
  await fetch(SB_URL + '/rest/v1/quotes?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ status: 'rejected' })
  });
  location.reload();
}

function showError(title, sub) {
  document.getElementById('main').innerHTML =
    '<div class="error-card" style="margin-top:32px">'
    + '<div class="error-title">' + title + '</div>'
    + '<div class="error-sub">' + sub + '</div>'
  + '</div>';
  document.getElementById('statusPill').textContent = 'Error';
}

loadQuote();
</script>
</body>
</html>
